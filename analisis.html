<!DOCTYPE html>
<html>
    <head>
        <title>WhatsUp - Analisis</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="css/analisis.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.3/wordcloud2.min.js" defer></script>
        <script src="js/analisis.js" defer></script>
    </head>
    <body>
        <nav class="nav">
            <div class="nav_logo">
                <a href="index.html"><i class="bi bi-bar-chart-fill"></i> <span>WhatsUp</span></a>
            </div>
        </nav>

        <main id="main_content">
            <div id="analysisSection">
                <h1>Resultados del Análisis</h1>
                <div id="analysisResults">

                    <div class="sectionAnalysis">
                        <div class="square">
                            <h2><i class="bi bi-person"></i> Usuario con mas mensajes</h2>
                        </div>
                        <h3 id="personName"><i class="bi bi-file-person"></i></h3>
                        <p id="personMessages"><i class="bi bi-chat-dots"></i> Mensajes enviados: </p>
                    </div>

                    <div class="sectionAnalysis">
                        <div class="square">
                            <h2><i class="bi bi-emoji-smile"></i> Emoji mas usado</h2>
                        </div>
                        <h3 id="emojiTotal">Emoji mas usado: </h3>
                        <p id="emojiCount"></p>
                    </div>

                    <div class="sectionAnalysis">
                        <div class="square">
                            <h2><i class="bi bi-clock"></i> Franja horaria con mayor actividad</h2>
                        </div>
                        <h3 id="hourRange"><i class="bi bi-alarm"></i></h3>
                        <p id="hourMessages"><i class="bi bi-chat-dots"></i> Mensajes enviados: </p>
                    </div>

                    <div class="sectionAnalysis">
                        <div class="square">
                            <h2><i class="bi bi-calendar"></i> Dia con mayor cantidad de mensajes</h2>
                        </div>
                        <h3 id="topDay"><i class="bi bi-calendar-event"></i></h3>
                        <p id="topDayMessages"><i class="bi bi-chat-dots"></i> Mensajes enviados: </p>
                    </div>
                   
                    <div class="sectionAnalysis sectionAnalysis--wordcloud">
                        <div class="square">
                            <h2><i class="bi bi-cloud"></i> Nube de palabras</h2>
                        </div>
                        <div id="wordCloud"></div>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
